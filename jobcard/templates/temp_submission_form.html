<h2 class="title">Operator Entry Panel</h2>

<style>
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #f0f4f8, #ffffff);
    margin: 0;
    padding: 30px;
}

/* HEADER */
.title {
    text-align: center;
    color: #1e293b;
    margin-bottom: 40px;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1px;
}

/* CARD */
.line-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 30px;
    margin-bottom: 30px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    transition: transform 0.25s, box-shadow 0.25s;
    border: 1px solid #e2e8f0;
}

.line-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
}

/* LINE TITLE */
.line-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #0f172a;
    border-bottom: 2px solid #e0e7ff;
    padding-bottom: 6px;
}

/* HOUR LABEL GRID */
.hour-labels {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
    gap: 10px;
    margin-bottom: 10px;
}

.hour-labels span {
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: #475569;
}

/* INPUT GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
    gap: 10px;
    margin-bottom: 15px;
}

/* INPUT */
input[type=number] {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    background: #f8fafc;
    transition: all 0.2s;
}

input[type=number]:focus {
    outline: none;
    border-color: #2563eb;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    transform: scale(1.05);
}

input.locked {
    background: #e2e8f0 !important;
    border-color: #94a3b8 !important;
    color: #475569;
}

/* TOTAL BOX */
.total-box {
    margin-top: 12px;
    padding: 12px 16px;
    background: linear-gradient(90deg, #e0f2fe, #f0f9ff);
    border-radius: 10px;
    font-weight: 600;
    color: #1e293b;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #bae6fd;
    font-size: 16px;
}

.total-value {
    font-size: 22px;
    color: #0ea5e9;
    font-weight: 800;
}

/* RESPONSIVE ADJUSTMENTS */
@media(max-width: 600px){
    .grid, .hour-labels {
        grid-template-columns: repeat(auto-fit, minmax(45px, 1fr));
    }
    .line-title {
        font-size: 20px;
    }
    input[type=number] {
        font-size: 14px;
    }
}
</style>

{% for line, form, obj in forms_data %}
<div class="line-card">
    <div class="line-title">{{ line|title }}</div>
    <form class="line-form" data-line="{{ line }}">
        {% csrf_token %}
        <input type="hidden" name="line" value="{{ line }}">

        <!-- Hour Labels -->
        <div class="hour-labels">
            <span>H1</span><span>H2</span><span>H3</span>
            <span>H4</span><span>H5</span><span>H6</span>
            <span>H7</span><span>H8</span><span>H9</span>
            <span>H10</span><span>H11</span><span>H12</span>
        </div>

        <!-- Inputs -->
        <div class="grid">
            <input type="number" name="hour1" value="{{ obj.hour1|default_if_none:'' }}" {% if obj.hour1 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour2" value="{{ obj.hour2|default_if_none:'' }}" {% if obj.hour2 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour3" value="{{ obj.hour3|default_if_none:'' }}" {% if obj.hour3 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour4" value="{{ obj.hour4|default_if_none:'' }}" {% if obj.hour4 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour5" value="{{ obj.hour5|default_if_none:'' }}" {% if obj.hour5 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour6" value="{{ obj.hour6|default_if_none:'' }}" {% if obj.hour6 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour7" value="{{ obj.hour7|default_if_none:'' }}" {% if obj.hour7 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour8" value="{{ obj.hour8|default_if_none:'' }}" {% if obj.hour8 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour9" value="{{ obj.hour9|default_if_none:'' }}" {% if obj.hour9 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour10" value="{{ obj.hour10|default_if_none:'' }}" {% if obj.hour10 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour11" value="{{ obj.hour11|default_if_none:'' }}" {% if obj.hour11 %}disabled class="locked"{% endif %}>
            <input type="number" name="hour12" value="{{ obj.hour12|default_if_none:'' }}" {% if obj.hour12 %}disabled class="locked"{% endif %}>
        </div>

        <!-- Total -->
        <div class="total-box">
            <div>Total Output</div>
            <div class="total-value total">0</div>
        </div>
    </form>
</div>
{% endfor %}

<script>
document.querySelectorAll(".line-form").forEach(form => {
    const inputs = form.querySelectorAll("input[type=number]");
    const totalDiv = form.querySelector(".total-value");

    const recalcTotal = () => {
        let sum = 0;
        inputs.forEach(i => {
            let val = parseFloat(i.value);
            if(!isNaN(val)) sum += val;
        });
        totalDiv.textContent = sum;
    };

    recalcTotal();

    inputs.forEach(input => {
        input.addEventListener("change", async () => {
            if(!input.value || input.disabled) return;

            const fd = new FormData(form);

            // ✅ ALWAYS append shift
            fd.append("shift", "{{ shift }}");

            try{
                const res = await fetch("",{
                    method:"POST",
                    headers:{
                        "X-CSRFToken": form.querySelector("[name=csrfmiddlewaretoken]").value,
                        "X-Requested-With":"XMLHttpRequest"
                    },
                    body:fd
                });

                const data = await res.json();

                if(data.error){
                    alert(data.error);
                    input.value="";
                    recalcTotal();
                    return;
                }

                if(data.success){
                    input.disabled = true;
                    input.classList.add("locked");
                    recalcTotal();
                }

            }catch(err){
                console.error(err);
            }
        });
    });
});
</script>

<!-- ========================= -->
<!-- RESET / SHIFT NOTIFICATION SYSTEM -->
<!-- ========================= -->
<script>
let lastEventSeen = null;

// ✅ POLLING INTERVAL UPDATED TO 30 SECONDS
setInterval(() => {
    fetch("/jobcard/get-active-shift/")
        .then(res => res.json())
        .then(data => {

            if (!data.last_reset) return;

            if (!lastEventSeen) {
                lastEventSeen = data.last_reset;
                return;
            }

            if (data.last_reset !== lastEventSeen) {
                lastEventSeen = data.last_reset;
                showNotification(data);
            }
        })
        .catch(() => {});
}, 30000); // 30 seconds now


function showNotification(data) {

    // Prevent duplicate banners
    if (document.getElementById("reset-banner")) return;

    const banner = document.createElement("div");
    banner.id = "reset-banner";

    let title = "System Update";
    let message = "Please reload the page to continue.";
    let icon = "⚠️";

    if (data.event_type === "shift_start") {
        title = `Shift Started: ${data.shift}`;
        message = data.line
            ? `Supervisor started ${data.shift} shift for ${data.line}`
            : `Supervisor started ${data.shift} shift`;
        icon = "🔄";
    }

    if (data.event_type === "line_reset") {
        title = `Line Reset: ${data.line}`;
        message = `Supervisor reset line ${data.line}`;
        icon = "🔁";
    }

    banner.innerHTML = `
        <div class="reset-content">
            <div class="reset-icon">${icon}</div>

            <div class="reset-text">
                <strong>${title}</strong>
                <span>${message}</span>
            </div>

            <button class="reset-btn" onclick="location.reload()">Reload</button>
        </div>
    `;

    document.body.appendChild(banner);
}
</script>

<!-- ========================= -->
<!-- RESET NOTIFICATION STYLES -->
<!-- ========================= -->
<style>
#reset-banner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;

    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;

    box-shadow: 0 6px 20px rgba(0,0,0,0.2);

    animation: slideDown 0.4s ease;
}

.reset-content {
    max-width: 1100px;
    margin: auto;
    padding: 12px 20px;

    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
}

.reset-icon {
    font-size: 20px;
}

.reset-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    font-size: 14px;
}

.reset-text strong {
    font-size: 15px;
    font-weight: 700;
}

.reset-text span {
    font-size: 13px;
    opacity: 0.9;
}

.reset-btn {
    background: white;
    color: #dc2626;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
}

.reset-btn:hover {
    background: #f1f5f9;
    transform: translateY(-1px);
}

/* Animation */
@keyframes slideDown {
    from {
        transform: translateY(-100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Mobile responsiveness */
@media (max-width: 600px) {
    .reset-content {
        flex-direction: column;
        align-items: flex-start;
    }

    .reset-btn {
        width: 100%;
    }
}
</style>
